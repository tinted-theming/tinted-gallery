name: Update gallery with latest schemes
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # https://crontab.guru/every-day
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch the repository code
        uses: actions/checkout@v4

      - name: Install tinty from source
        uses: baptiste0928/cargo-install@v3
        with:
          crate: tinty
          git: https://github.com/tinted-theming/tinty
          branch: main

      - name: Install schemes
        run: tinty install

      - name: Generate gallery HTML
        run: tinty gallery --no-open --dump gallery

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.BOT_ACCESS_TOKEN }}
          publish_dir: ./gallery

